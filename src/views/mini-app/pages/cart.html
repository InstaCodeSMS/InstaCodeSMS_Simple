<!-- 购物车页面 -->
<div x-data="cart">
  <div class="mb-6">
    <h2 class="text-2xl font-bold">🛒 购物车</h2>
  </div>
  
  <!-- 空购物车 -->
  <template x-if="items.length === 0">
    <div class="card bg-base-100 shadow-lg">
      <div class="card-body text-center py-12">
        <div class="text-6xl mb-4">🛒</div>
        <p class="text-lg opacity-70 mb-4">购物车是空的</p>
        <button class="btn btn-primary" @click="$root.goToHome()">
          去购物
        </button>
      </div>
    </div>
  </template>
  
  <!-- 购物车列表 -->
  <template x-if="items.length > 0">
    <div class="space-y-4">
      <!-- 购物车项 -->
      <template x-for="item in items" :key="item.id">
        <div class="card bg-base-100 shadow-lg">
          <div class="card-body">
            <div class="flex justify-between items-start">
              <div class="flex-1">
                <h3 class="font-bold text-lg" x-text="item.title"></h3>
                <p class="text-primary font-bold mt-2">
                  ¥<span x-text="item.price"></span>
                </p>
              </div>
              <button class="btn btn-ghost btn-sm btn-circle"
                      @click="removeItem(item.id)">
                ✕
              </button>
            </div>
            
            <div class="flex justify-between items-center mt-4">
              <div class="flex items-center gap-2">
                <button class="btn btn-sm btn-circle"
                        @click="updateQuantity(item.id, item.quantity - 1)"
                        :disabled="item.quantity <= 1">
                  −
                </button>
                <input type="number" 
                       x-model.number="item.quantity"
                       @change="updateQuantity(item.id, item.quantity)"
                       class="input input-bordered input-sm w-16 text-center"
                       min="1">
                <button class="btn btn-sm btn-circle"
                        @click="updateQuantity(item.id, item.quantity + 1)">
                  +
                </button>
              </div>
              <div class="text-right">
                <div class="text-sm opacity-60">小计</div>
                <div class="font-bold text-lg">
                  ¥<span x-text="(item.price * item.quantity).toFixed(2)"></span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </template>
      
      <!-- 总计 -->
      <div class="card bg-primary text-primary-content shadow-lg">
        <div class="card-body">
          <div class="flex justify-between items-center">
            <div>
              <div class="text-sm opacity-80">总计</div>
              <div class="text-3xl font-bold">
                ¥<span x-text="total.toFixed(2)"></span>
              </div>
            </div>
            <div class="flex flex-col gap-2">
              <button class="btn btn-secondary"
                      @click="checkout()">
                结算 (<span x-text="count"></span>)
              </button>
              <button class="btn btn-ghost btn-sm"
                      @click="clearCart()">
                清空购物车
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </template>
</div>

<script>
function checkout() {
  const cart = Alpine.store('cart')
  if (cart.items.length === 0) {
    window.telegram?.showAlert('购物车是空的')
    return
  }
  
  // 跳转到结算页面
  htmx.ajax('POST', '/mini-app/api/checkout', {
    target: '#content',
    swap: 'innerHTML',
    values: { items: JSON.stringify(cart.items) }
  })
}
</script>
