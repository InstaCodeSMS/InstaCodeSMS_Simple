<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>结算 - SimpleFaka</title>
    <script src="https://unpkg.com/htmx.org@1.9.6"></script>
    <script src="https://unpkg.com/alpinejs@3.14.1/dist/cdn.min.js" defer></script>
    <script src="/mini-app/js/telegram.js"></script>
    <script src="/mini-app/js/app.js"></script>
    <link href="/mini-app/css/style.css" rel="stylesheet">
</head>
<body class="bg-base-100">
    <div class="container mx-auto p-4">
        <!-- 头部 -->
        <header class="mb-6">
            <h1 class="text-2xl font-bold text-center">结算页面</h1>
        </header>

        <!-- 购物车内容 -->
        <div id="cart-content" class="bg-white rounded-lg shadow-md p-4 mb-6">
            <h2 class="text-lg font-semibold mb-4">确认订单</h2>
            <div id="cart-items" class="space-y-3">
                <!-- 购物车项目将通过 HTMX 动态加载 -->
            </div>
            <div class="border-t pt-4 mt-4">
                <div class="flex justify-between items-center text-lg font-bold">
                    <span>总计：</span>
                    <span id="total-amount">¥0.00</span>
                </div>
            </div>
        </div>

        <!-- 支付方式选择 -->
        <div class="bg-white rounded-lg shadow-md p-4 mb-6">
            <h3 class="text-lg font-semibold mb-4">选择支付方式</h3>
            <div class="grid grid-cols-2 gap-4">
                <label class="flex items-center space-x-3 p-3 border rounded-lg cursor-pointer hover:bg-gray-50">
                    <input type="radio" name="payment_method" value="alipay" checked class="radio radio-primary">
                    <span>支付宝</span>
                </label>
                <label class="flex items-center space-x-3 p-3 border rounded-lg cursor-pointer hover:bg-gray-50">
                    <input type="radio" name="payment_method" value="usdt" class="radio radio-primary">
                    <span>USDT</span>
                </label>
            </div>
        </div>

        <!-- 操作按钮 -->
        <div class="flex gap-4">
            <button onclick="window.history.back()" class="btn btn-outline flex-1">
                返回购物车
            </button>
            <button id="pay-button" class="btn btn-primary flex-1" onclick="createPayment()">
                立即支付
            </button>
        </div>
    </div>

    <!-- 支付弹窗 -->
    <div id="payment-modal" class="modal" style="display: none;">
        <div class="modal-box">
            <h3 class="font-bold text-lg mb-4">支付二维码</h3>
            <div id="payment-content" class="text-center">
                <div class="loading loading-spinner loading-lg mx-auto"></div>
                <p class="mt-4">正在生成支付订单...</p>
            </div>
            <div class="modal-action">
                <button class="btn" onclick="closePaymentModal()">关闭</button>
            </div>
        </div>
    </div>

    <script>
        // 加载购物车内容
        document.addEventListener('DOMContentLoaded', () => {
            loadCartContent()
        })

        async function loadCartContent() {
            try {
                const response = await fetch('/mini-app/api/cart', {
                    headers: {
                        'X-Telegram-User-Id': window.telegram?.getUserId(),
                        'X-Telegram-Init-Data': window.telegram?.getInitData()
                    }
                })
                
                if (!response.ok) throw new Error('Failed to load cart')
                
                const { data: items } = await response.json()
                renderCartItems(items)
                updateTotal(items)
            } catch (error) {
                console.error('Load cart error:', error)
                window.telegram?.showAlert('加载购物车失败')
            }
        }

        function renderCartItems(items) {
            const container = document.getElementById('cart-items')
            container.innerHTML = ''

            if (items.length === 0) {
                container.innerHTML = '<p class="text-center text-gray-500">购物车为空</p>'
                return
            }

            items.forEach(item => {
                const div = document.createElement('div')
                div.className = 'flex justify-between items-center p-3 border rounded'
                div.innerHTML = `
                    <div>
                        <div class="font-medium">${item.title}</div>
                        <div class="text-sm text-gray-500">¥${item.price}</div>
                    </div>
                    <div class="text-right">
                        <div class="font-semibold">x${item.quantity}</div>
                        <div class="text-sm text-gray-500">¥${(item.price * item.quantity).toFixed(2)}</div>
                    </div>
                `
                container.appendChild(div)
            })
        }

        function updateTotal(items) {
            const total = items.reduce((sum, item) => sum + (item.price * item.quantity), 0)
            document.getElementById('total-amount').textContent = `¥${total.toFixed(2)}`
        }

        // 创建支付订单
        async function createPayment() {
            const payButton = document.getElementById('pay-button')
            payButton.disabled = true
            payButton.innerHTML = '<span class="loading loading-spinner loading-sm"></span> 创建订单...'

            try {
                const response = await fetch('/mini-app/api/checkout', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Telegram-User-Id': window.telegram?.getUserId(),
                        'X-Telegram-Init-Data': window.telegram?.getInitData()
                    },
                    body: JSON.stringify({
                        items: await getCartItems()
                    })
                })

                if (!response.ok) throw new Error('Failed to create order')

                const { data: order } = await response.json()
                
                // 显示支付二维码
                showPaymentModal(order)
                
            } catch (error) {
                console.error('Create payment error:', error)
                window.telegram?.showAlert('创建订单失败')
            } finally {
                payButton.disabled = false
                payButton.textContent = '立即支付'
            }
        }

        async function getCartItems() {
            const response = await fetch('/mini-app/api/cart', {
                headers: {
                    'X-Telegram-User-Id': window.telegram?.getUserId(),
                    'X-Telegram-Init-Data': window.telegram?.getInitData()
                }
            })
            const { data } = await response.json()
            return data
        }

        function showPaymentModal(order) {
            const modal = document.getElementById('payment-modal')
            const content = document.getElementById('payment-content')
            
            content.innerHTML = `
                <div class="mb-4">
                    <p class="text-sm text-gray-600 mb-2">订单号：${order.ordernum}</p>
                    <p class="text-sm text-gray-600 mb-4">金额：¥${order.amount}</p>
                </div>
                <div class="border-2 border-dashed border-gray-300 rounded-lg p-4 mb-4">
                    <p class="text-gray-500">支付链接：</p>
                    <a href="${order.payment_url}" target="_blank" class="text-blue-500 hover:underline break-all">
                        ${order.payment_url}
                    </a>
                </div>
                <div class="flex gap-2">
                    <button class="btn btn-primary" onclick="checkPaymentStatus('${order.ordernum}')">
                        检查支付状态
                    </button>
                    <button class="btn" onclick="window.open('${order.payment_url}', '_blank')">
                        前往支付
                    </button>
                </div>
            `
            
            modal.style.display = 'flex'
            modal.classList.add('modal-open')
        }

        function closePaymentModal() {
            const modal = document.getElementById('payment-modal')
            modal.style.display = 'none'
            modal.classList.remove('modal-open')
        }

        // 检查支付状态
        async function checkPaymentStatus(ordernum) {
            try {
                const response = await fetch(`/mini-app/api/orders/${ordernum}`, {
                    headers: {
                        'X-Telegram-User-Id': window.telegram?.getUserId(),
                        'X-Telegram-Init-Data': window.telegram?.getInitData()
                    }
                })

                if (!response.ok) throw new Error('Failed to check status')

                const { data: order } = await response.json()
                
                if (order.status === 'paid') {
                    window.telegram?.showAlert('支付成功！')
                    closePaymentModal()
                    window.location.href = '/mini-app/pages/orders'
                } else {
                    window.telegram?.showAlert('订单未支付，请完成支付后重试')
                }
            } catch (error) {
                console.error('Check payment status error:', error)
                window.telegram?.showAlert('检查支付状态失败')
            }
        }
    </script>
</body>
</html>
