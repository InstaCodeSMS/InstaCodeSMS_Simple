<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SimpleFaka 商城</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5/dist/full.min.css" rel="stylesheet">
  
  <!-- HTMX -->
  <script src="https://unpkg.com/htmx.org@2.0.8"></script>
  
  <!-- Alpine.js -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  
  <!-- Telegram Web App SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script><style>
    body {
      overscroll-behavior: none;-webkit-overflow-scrolling: touch;
    }
  </style>
</head>
<body class="min-h-screen bg-base-200">
  <div x-data="miniApp" class="container mx-auto px-4 py-6 max-w-4xl">
    <!-- 头部 -->
    <header class="mb-6">
      <div class="flex justify-between items-center">
        <h1 class="text-2xl font-bold">🛍️ SimpleFaka</h1>
        <div class="flex gap-2">
          <button class="btn btn-ghost btn-sm" @click="goToOrders()">
            📦 订单
            <span x-show="cartCount > 0" class="badge badge-primary" x-text="cartCount"></span>
          </button>
        </div>
      </div>
    </header>
    
    <!-- 主内容区 -->
    <main id="content" 
          hx-get="/mini-app/pages/home" 
          hx-trigger="load"
          hx-indicator="#loading">
      <!-- HTMX 动态加载内容 -->
    </main>
    
    <!-- 加载指示器 -->
    <div id="loading" class="htmx-indicator flex justify-center items-center py-8">
      <span class="loading loading-spinner loading-lg"></span>
    </div>
    
    <!-- 购物车浮动按钮 -->
    <div x-show="cartCount > 0" 
         class="fixed bottom-6 right-6 z-50">
      <button class="btn btn-primary btn-circle btn-lg shadow-lg"
              @click="goToCart()">
        🛒
        <span class="badge badge-secondary absolute -top-2 -right-2" 
              x-text="cartCount"></span>
      </button>
    </div>
  </div>
  
  <!-- JavaScript -->
  <script src="/mini-app/js/telegram.js"></script>
  <script src="/mini-app/js/app.js"></script>
</body>
</html>
