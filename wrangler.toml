name = "instacodesms-simple"
main = "src/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[dev]
port = 3000
local_protocol = "http"

# 配置 ESBuild 模块解析规则
[[rules]]
type = "ESModule"
globs = ["**/*.ts"]
fallthrough = true

# 配置 ESBuild 路径别名
[build]
command = ""

# 环境变量配置
[env.production]
vars = { UPSTREAM_API_URL = "https://api.example.com", PRICE_MARKUP = "1.5", LOG_LEVEL = "info" }
