name = "instacodesms-simple"
main = "src/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# Hyperdrive 数据库连接（用于 Better Auth）
[[hyperdrive]]
binding = "HYPERDRIVE"
id = "6c9d47e6c53441f4accdb6b006702448"
# 本地开发使用的连接串（密码已更新）
localConnectionString = "postgresql://postgres:Qwer235678jkl@db.nyiozcmzdehybowlnyvh.supabase.co:5432/postgres"

[dev]
port = 3000
local_protocol = "http"
# 本地开发环境变量已移至 .dev.vars 文件

# 配置 ESBuild 模块解析规则
[[rules]]
type = "ESModule"
globs = ["**/*.ts"]
fallthrough = true

# 配置 ESBuild 路径别名
[build]
command = ""

[build.upload]
format = "modules"

# 环境变量配置
# 注意：敏感信息（API tokens, keys等）应该通过环境变量或 wrangler secret 设置
# 不要在这里硬编码敏感信息

[env.production]
vars = { UPSTREAM_API_URL = "https://api.example.com", PRICE_MARKUP = "1.5", LOG_LEVEL = "info" }